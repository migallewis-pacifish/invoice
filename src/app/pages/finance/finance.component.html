<app-workspace-shell shellClass="finance-page">
  <section class="hero card">
    <div>
      <p class="eyebrow">Finance</p>
      <h1>Monthly finance summary</h1>
      <p class="muted">Review paid client invoices, company and client expenses, VAT, and accountant exports.</p>
    </div>
    <div class="actions">
      <label>Month <input type="month" [ngModel]="selectedMonth()" (ngModelChange)="onMonthChange($event)"></label>
      <button class="primary" type="button" (click)="exportCsv()">Export CSV</button>
    </div>
  </section>

  <section class="metrics">
    <app-metric-card label="Paid invoice totals" [value]="format(profitSummary().invoiceTotal)"></app-metric-card>
    <app-metric-card label="Total expenses" tone="expenses" [value]="format(profitSummary().expenseTotal)"></app-metric-card>
    <app-metric-card label="Monthly profit" tone="profit" [value]="format(profitSummary().profit)"></app-metric-card>
  </section>

  <section class="card vat-card">
    <h2>VAT report</h2>
    <div class="vat-grid">
      <div><span>VAT collected</span><strong>{{ format(vatReport().vatCollected) }}</strong></div>
      <div><span>VAT paid</span><strong>{{ format(vatReport().vatPaid) }}</strong></div>
      <div><span>Net VAT</span><strong>{{ format(vatReport().netVat) }}</strong></div>
    </div>
  </section>

  <app-expenses
    class="finance-expenses"
    *ngIf="companyId()"
    [companyId]="companyId()"
    [showClientPicker]="false"
    title="Company-level Expenses"
    subtitle="Capture expenses saved directly to the company, separate from client expenses."
  />
</app-workspace-shell>
