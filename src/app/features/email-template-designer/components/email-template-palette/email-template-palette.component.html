<section class="designer-panel"><h2>Elements</h2><h3>Layouts</h3><button class="palette-item" type="button" cdkDrag [cdkDragData]="item" *ngFor="let item of layouts">{{ item.label }}</button><h3>Content</h3><button class="palette-item" type="button" cdkDrag [cdkDragData]="item" *ngFor="let item of elements">{{ item.label }}</button><h3>Variables</h3><div *ngFor="let group of registry.groupedVariables()" class="variable-group"><strong>{{ group.group }}</strong><button type="button" class="token" *ngFor="let variable of group.variables" cdkDrag [cdkDragData]="{ kind: 'element', label: variable.label, elementType: 'variable', variablePath: variable.path }" (click)="variableInsert.emit(variable.token)">{{ variable.token }}</button></div></section>
