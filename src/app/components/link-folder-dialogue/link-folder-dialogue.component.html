<div class="dialog-shell">
  <!-- Step 1 -->
  <ng-container *ngIf="step() === 1">
    <div class="dialog-header">
        <h3>Link Folder</h3>
        <button class="icon-btn" (click)="close()">✕</button>
    </div>
    <p class="muted">Local DOCX download only. Cloud save providers are coming soon.</p>

    <div class="options">
      <button class="option-btn" (click)="selectProvider('local')">Local DOCX Download</button>
      <button class="option-btn disabled" type="button" disabled title="Google Drive save is not implemented yet.">Google Drive — coming soon</button>
      <button class="option-btn disabled" type="button" disabled title="OneDrive save is not implemented yet.">OneDrive — coming soon</button>
    </div>
  </ng-container>

  <!-- Step 2: Local folder -->
  <ng-container *ngIf="step() === 2">
    <div class="dialog-header">
        <h3>Select Local Folder</h3>
        <button class="icon-btn" (click)="close()">✕</button>
    </div>
    <p>Choose a local folder label for downloaded DOCX invoices.</p>

    <div class="input-section">
      <button class="primary" (click)="pickFolder()">Choose Folder</button>
      <p *ngIf="folderPath()">Selected: {{ folderPath() }}</p>
    </div>

    <div class="actions">
      <button class="secondary" (click)="back()">Back</button>
      <button class="primary" [disabled]="!folderPath()" (click)="confirm()">Confirm</button>
    </div>
  </ng-container>

</div>
