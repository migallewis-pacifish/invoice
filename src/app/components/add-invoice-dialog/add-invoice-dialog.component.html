<app-dialog-shell [title]="dialogTitle" (closed)="close()">
    <form [formGroup]="form" (ngSubmit)="generateInvoice()" class="dialog-body">
        <p class="copy-note" *ngIf="previousInvoice || viewOnly || trackingOnly">{{ helperText }}</p>
        <div class="form-group">
            <label>Invoice Number <span>*</span></label>
            <input type="text" formControlName="invoiceNumber">
        </div>

        <div class="item-row header">
            <div>Description</div>
            <div>Rate ({{ currencySymbol() }})</div>
            <div>Hours</div>
            <div>Total ({{ currencySymbol() }})</div>
            <div></div>
        </div>

        <div formArrayName="items" class="items-block">
            <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-row">
                <input placeholder="Description" formControlName="description">
                <input type="number" placeholder="Rate ({{ currencySymbol() }})" formControlName="rate">
                <input type="number" placeholder="Hours" formControlName="hours">
                <input type="number" placeholder="Total" formControlName="total" readonly>
                <button type="button" class="remove" *ngIf="!viewOnly && !trackingOnly" (click)="removeItem(i)">✕</button>
            </div>
        </div>

        <button type="button" class="ghost add-item-btn" *ngIf="!viewOnly && !trackingOnly" (click)="addItem()">+ Add Item</button>

        <div class="form-group full">
            <label>
                <input type="checkbox" formControlName="includeVat">
                Include VAT
            </label>
        </div>

        <div class="form-group full">
            <label>Services Provided <span>*</span></label>
            <input type="text" formControlName="servicesProvided">
        </div>

        <div class="form-group">
            <label>Due Date</label>
            <input type="date" formControlName="dueDate">
        </div>

        <ng-container *ngIf="trackingOnly">
            <div class="form-group">
                <label>Amount Paid ({{ currencySymbol() }})</label>
                <input type="number" min="0" step="0.01" formControlName="amountPaid" [readonly]="!canEditAmountPaid()">
            </div>

            <div class="form-group">
                <label>Credit Amount ({{ currencySymbol() }})</label>
                <input type="number" min="0" step="0.01" formControlName="creditAmount">
            </div>

            <div class="form-group">
                <label>Refund Amount ({{ currencySymbol() }})</label>
                <input type="number" min="0" step="0.01" formControlName="refundAmount">
            </div>

            <div class="form-group full">
                <label>Status <span>*</span></label>
                <select formControlName="status">
                    <option value="draft">Draft</option>
                    <option value="sent">Sent</option>
                    <option value="partial">Partial</option>
                    <option value="paid">Paid</option>
                    <option value="overpaid">Overpaid</option>
                    <option value="credited">Credited</option>
                    <option value="refunded">Refunded</option>
                </select>
            </div>
        </ng-container>

        <div class="form-group full">
            <label>Notes (optional)</label>
            <textarea rows="3" formControlName="notes"></textarea>
        </div>

        <div class="actions">
            <button type="button" class="secondary" *ngIf="trackingOnly" [disabled]="saving() || form.invalid" (click)="saveTracking()">
                <span *ngIf="!saving()">Update Payment / Status</span>
                <span *ngIf="saving()" class="spinner"></span>
            </button>
            <button type="submit" class="primary" *ngIf="!trackingOnly" [disabled]="saving() || form.invalid">
                <span *ngIf="!saving()">{{ viewOnly ? 'Regenerate & Download' : 'Generate & Download Invoice' }}</span>
                <span *ngIf="saving()" class="spinner"></span>
            </button>
        </div>

        <div class="msg error" *ngIf="error()">{{ error() }}</div>
    </form>
</app-dialog-shell>
