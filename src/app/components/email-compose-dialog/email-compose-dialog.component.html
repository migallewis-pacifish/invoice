<form class="email-compose" [formGroup]="form" (ngSubmit)="send()">
  <header>
    <h2>Send email</h2>
    <p>Review recipients and message before sending the attached document.</p>
  </header>

  <app-form-field label="To" [required]="true"><input type="email" formControlName="recipient" placeholder="recipient@example.com"></app-form-field>
  <div class="copy-row">
    <app-form-field label="CC"><input formControlName="cc" placeholder="cc@example.com, optional"></app-form-field>
    <app-form-field label="BCC"><input formControlName="bcc" placeholder="bcc@example.com, optional"></app-form-field>
  </div>
  <app-form-field label="Subject" [required]="true"><input formControlName="subject"></app-form-field>
  <app-form-field label="Message" [required]="true"><textarea rows="7" formControlName="messageBody"></textarea></app-form-field>

  <section class="attachment-preview" aria-label="Attachment preview">
    <strong>Attachment</strong>
    <span>{{ attachmentLabel }}</span>
  </section>

  <p class="error" *ngIf="error()">{{ error() }}</p>
  <footer>
    <button class="secondary" type="button" (click)="cancel()" [disabled]="sending()">Cancel</button>
    <button class="primary" type="submit" [disabled]="sending()">{{ sending() ? 'Sending…' : 'Send email' }}</button>
  </footer>
</form>
